name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  react-app:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: templates/react_app

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/react_app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  node-api:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: templates/node_api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: templates/node_api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  python-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: templates/python_service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest
